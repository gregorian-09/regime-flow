site_name: RegimeFlow Docs
site_description: RegimeFlow architecture, API design, and user guides
site_url: https://gregorian-09.github.io/regime-flow/
repo_url: https://github.com/gregorian-09/regime-flow
repo_name: RegimeFlow
docs_dir: docs
theme:
  name: material
  custom_dir: docs/overrides
  font: false
  palette:
  - scheme: default
    primary: custom
    accent: custom
  features:
  - navigation.sections
  - navigation.top
  - navigation.tracking
  - navigation.indexes
  - navigation.expand
  - navigation.path
  - content.code.copy
  - content.code.annotate
  - content.tabs.link
markdown_extensions:
- admonition
- attr_list
- def_list
- footnotes
- pymdownx.superfences:
    custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.arithmatex:
    generic: true
- toc:
    permalink: true
extra_javascript:
  - assets/mermaid-d733041c.js
  - assets/mermaid-init.js
  - assets/katex.min.js
  - assets/auto-render.min.js
  - assets/katex-init.js
extra_css:
  - assets/site-theme.css
  - assets/katex.min.css
  - assets/diagram-theme.css
plugins:
- search
exclude_docs: '_maintainer/*'
extra:
  version:
    provider: mike
nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/overview.md
    - Installation: getting-started/installation.md
