live:
  broker: alpaca
  paper: true
  broker_asset_class: equity
  symbols: ["AAPL", "MSFT"]
  broker_config:
    enable_streaming: true
    stream_subscribe_template: '{"action":"subscribe","bars":{symbols},"quotes":{symbols}}'
    stream_unsubscribe_template: '{"action":"unsubscribe","bars":{symbols},"quotes":{symbols}}'
  reconnect:
    enabled: true
    initial_ms: 500
    max_ms: 10000
  heartbeat:
    enabled: true
    interval_ms: 10000
  risk:
    limits:
      max_notional: 50000
      max_position_pct: 0.2

strategy:
  name: buy_and_hold
  params:
    warmup_bars: 1
