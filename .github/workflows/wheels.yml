name: Wheels

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-latest
            runner: ubuntu-latest
            cibw_archs_linux: x86_64
            cibw_archs_macos: auto64
            cibw_archs_windows: auto64
            macos_deployment_target: 10.15
          - label: macos-15-intel-x86_64
            runner: macos-15-intel
            cibw_archs_linux: auto64
            cibw_archs_macos: x86_64
            cibw_archs_windows: auto64
            macos_deployment_target: 15.0
          - label: macos-14-arm64
            runner: macos-14
            cibw_archs_linux: auto64
            cibw_archs_macos: arm64
            cibw_archs_windows: auto64
            macos_deployment_target: 14.0
          - label: windows-latest
            runner: windows-latest
            cibw_archs_linux: auto64
            cibw_archs_macos: auto64
            cibw_archs_windows: AMD64
            macos_deployment_target: 10.15
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: pypa/cibuildwheel@ee63bf16da6cddfb925f542f2c7b59ad50e93969
        with:
          package-dir: .
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *-musllinux_*"
          CIBW_ARCHS_LINUX: "${{ matrix.cibw_archs_linux }}"
          CIBW_ARCHS_MACOS: "${{ matrix.cibw_archs_macos }}"
          CIBW_ARCHS_WINDOWS: "${{ matrix.cibw_archs_windows }}"
          CIBW_ENVIRONMENT_LINUX: 'CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF -DENABLE_ZMQ=OFF -DENABLE_REDIS=OFF -DENABLE_KAFKA=OFF -DENABLE_POSTGRES=OFF -DENABLE_CURL=OFF -DENABLE_OPENSSL=OFF" SKBUILD_CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF -DENABLE_ZMQ=OFF -DENABLE_REDIS=OFF -DENABLE_KAFKA=OFF -DENABLE_POSTGRES=OFF -DENABLE_CURL=OFF -DENABLE_OPENSSL=OFF"'
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }} CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF -DENABLE_ZMQ=OFF -DENABLE_REDIS=OFF -DENABLE_KAFKA=OFF -DENABLE_POSTGRES=OFF -DENABLE_CURL=OFF -DENABLE_OPENSSL=OFF -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}" SKBUILD_CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF -DENABLE_ZMQ=OFF -DENABLE_REDIS=OFF -DENABLE_KAFKA=OFF -DENABLE_POSTGRES=OFF -DENABLE_CURL=OFF -DENABLE_OPENSSL=OFF -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.macos_deployment_target }}"'
          CIBW_ENVIRONMENT_WINDOWS: 'CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF -DENABLE_ZMQ=OFF -DENABLE_REDIS=OFF -DENABLE_KAFKA=OFF -DENABLE_POSTGRES=OFF -DENABLE_CURL=OFF -DENABLE_OPENSSL=OFF" SKBUILD_CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF -DENABLE_ZMQ=OFF -DENABLE_REDIS=OFF -DENABLE_KAFKA=OFF -DENABLE_POSTGRES=OFF -DENABLE_CURL=OFF -DENABLE_OPENSSL=OFF"'
          CIBW_BEFORE_ALL_LINUX: >
            python -m pip install cmake &&
            (if command -v yum >/dev/null 2>&1; then yum install -y protobuf-devel;
            elif command -v dnf >/dev/null 2>&1; then dnf install -y protobuf-devel;
            elif command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y libprotobuf-dev protobuf-compiler;
            else echo "No supported package manager found for protobuf" && exit 1; fi)
          CIBW_BEFORE_ALL_MACOS: "python -m pip install cmake && brew install protobuf"
          CIBW_BEFORE_ALL_WINDOWS: "python -m pip install cmake"
          CIBW_TEST_COMMAND: "python -c \"import regimeflow; print('regimeflow', regimeflow.__version__)\""

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist .

      - name: Upload sdist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sdist
          path: python/dist/*.tar.gz
