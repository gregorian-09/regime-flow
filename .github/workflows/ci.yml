name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-bincache
    strategy:
      matrix:
        compiler: [gcc-13, clang-18]
        build_type: [Release, Debug]

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: python/pyproject.toml

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build clang-18 gcc-13 g++-13 ccache \
          libeigen3-dev libboost-all-dev \
          libprotobuf-dev protobuf-compiler \
          libssl-dev libcurl4-openssl-dev \
          libintelrdfpmath-dev

    - name: Configure ccache
      run: |
        mkdir -p "$HOME/.ccache"
        ccache --set-config=cache_dir="$HOME/.ccache"

    - name: Cache ccache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
      with:
        path: ~/.ccache
        key: ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ github.sha }}
        restore-keys: |
          ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-

    - name: Cache vcpkg downloads and binaries
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
      with:
        path: |
          vcpkg/archives
          vcpkg-bincache
        key: vcpkg-linux-${{ hashFiles('vcpkg.json') || 'novcpkg' }}-${{ github.sha }}
        restore-keys: |
          vcpkg-linux-${{ hashFiles('vcpkg.json') || 'novcpkg' }}-
          vcpkg-linux-

    - name: Setup Python venv
      run: |
        python -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install pybind11 numpy pandas pytest

    - name: Configure CMake
      run: |
        if [[ "${{ matrix.compiler }}" == "gcc-13" ]]; then
          export CC=gcc-13 CXX=g++-13
        else
          export CC=clang-18 CXX=clang++-18
        fi
        export CMAKE_PREFIX_PATH="${{ github.workspace }}/.venv"
        PYTHON_BIN="${{ github.workspace }}/.venv/bin/python"
        NUMPY_INC="$($PYTHON_BIN -c 'import numpy; print(numpy.get_include())')"
        PYBIND11_DIR="$($PYTHON_BIN -c 'import pybind11; print(pybind11.get_cmake_dir())')"
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DBUILD_TESTS=ON \
          -DBUILD_PYTHON_BINDINGS=ON \
          -DREGIMEFLOW_FETCH_DEPS=ON \
          -DPython3_EXECUTABLE="$PYTHON_BIN" \
          -DPython3_NumPy_INCLUDE_DIRS="$NUMPY_INC" \
          -Dpybind11_DIR="$PYBIND11_DIR"

    - name: Build
      run: cmake --build build

    - name: Test
      env:
        REGIMEFLOW_TEST_ROOT: ${{ github.workspace }}
      run: cd build && ctest --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: regimeflow-linux-${{ matrix.compiler }}-${{ matrix.build_type }}
        path: build/lib/*.so

  build-macos:
    runs-on: macos-14
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-bincache
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: python/pyproject.toml

    - name: Install dependencies
      run: |
        brew install cmake ninja eigen boost protobuf ccache hiredis pkg-config
        python -m venv .venv
        . .venv/bin/activate
        python -m pip install --upgrade pip
        python -m pip install pybind11 numpy pandas pytest

    - name: Configure ccache
      run: |
        mkdir -p "$HOME/.ccache"
        ccache --set-config=cache_dir="$HOME/.ccache"

    - name: Cache ccache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
      with:
        path: ~/.ccache
        key: ccache-macos-${{ matrix.build_type }}-${{ github.sha }}
        restore-keys: |
          ccache-macos-${{ matrix.build_type }}-

    - name: Cache vcpkg downloads and binaries
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
      with:
        path: |
          vcpkg/archives
          vcpkg-bincache
        key: vcpkg-macos-${{ hashFiles('vcpkg.json') || 'novcpkg' }}-${{ github.sha }}
        restore-keys: |
          vcpkg-macos-${{ hashFiles('vcpkg.json') || 'novcpkg' }}-
          vcpkg-macos-

    - name: Configure CMake
      run: |
        export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:/opt/homebrew/share/pkgconfig"
        PYTHON_BIN="${{ github.workspace }}/.venv/bin/python"
        NUMPY_INC="$($PYTHON_BIN -c 'import numpy; print(numpy.get_include())')"
        PYBIND11_DIR="$($PYTHON_BIN -c 'import pybind11; print(pybind11.get_cmake_dir())')"
        cmake -B build -G Ninja \
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/.venv" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DBUILD_TESTS=ON \
          -DBUILD_PYTHON_BINDINGS=ON \
          -DREGIMEFLOW_FETCH_DEPS=ON \
          -DPython3_EXECUTABLE="$PYTHON_BIN" \
          -DPython3_NumPy_INCLUDE_DIRS="$NUMPY_INC" \
          -Dpybind11_DIR="$PYBIND11_DIR"

    - name: Build
      run: cmake --build build

    - name: Test
      env:
        REGIMEFLOW_TEST_ROOT: ${{ github.workspace }}
      run: cd build && ctest --output-on-failure

  build-windows:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-bincache,readwrite
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: python/pyproject.toml

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@5c330b455f564f5da8d76ddd421de0e33f763f03

    - name: Install dependencies
      run: |
        choco install cmake ninja --yes --no-progress
        refreshenv
        python -m venv .venv
        .venv\\Scripts\\python -m pip install --upgrade pip
        .venv\\Scripts\\python -m pip install pybind11 numpy pandas pytest

    - name: Cache vcpkg downloads and binaries
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
      with:
        path: |
          C:\vcpkg\archives
          ${{ github.workspace }}\vcpkg-bincache
          ${{ github.workspace }}\vcpkg_installed
        key: vcpkg-windows-${{ hashFiles('vcpkg.json') || 'novcpkg' }}-${{ github.sha }}
        restore-keys: |
          vcpkg-windows-${{ hashFiles('vcpkg.json') || 'novcpkg' }}-
          vcpkg-windows-

    - name: Install vcpkg packages
      run: |
        $ErrorActionPreference = "Stop"
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg-bincache" | Out-Null
        for ($i = 1; $i -le 3; $i++) {
          try {
            vcpkg install --vcpkg-root C:\vcpkg --x-manifest-root "${{ github.workspace }}" --x-install-root "${{ github.workspace }}\\vcpkg_installed" --triplet x64-windows
            break
          } catch {
            if ($i -eq 3) { throw }
            Start-Sleep -Seconds (30 * $i)
          }
        }

    - name: Configure CMake
      run: |
        $python = "${{ github.workspace }}\.venv\Scripts\python.exe"
        $ninja = (Get-Command ninja).Source
        $numpyInc = & $python -c "import numpy; print(numpy.get_include())"
        $pybind11Dir = & $python -c "import pybind11; print(pybind11.get_cmake_dir())"
        $cmakeArgs = @(
          "-B", "build",
          "-G", "Ninja",
          "-DCMAKE_BUILD_TYPE=${{ matrix.build_type }}",
          "-DCMAKE_PREFIX_PATH=${{ github.workspace }}\.venv",
          "-DCMAKE_TOOLCHAIN_FILE=C:\\vcpkg\\scripts\\buildsystems\\vcpkg.cmake",
          "-DVCPKG_INSTALLED_DIR=${{ github.workspace }}\\vcpkg_installed",
          "-DREGIMEFLOW_FETCH_DEPS=ON",
          "-DCMAKE_MAKE_PROGRAM=$ninja",
          "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
          "-DENABLE_POSTGRES=OFF",
          "-DBUILD_TESTS=ON",
          "-DBUILD_PYTHON_BINDINGS=ON",
          "-DPython3_EXECUTABLE=$python",
          "-DPython3_NumPy_INCLUDE_DIRS=$numpyInc",
          "-Dpybind11_DIR=$pybind11Dir"
        )
        Write-Host "CMake args: $($cmakeArgs -join ' ')"
        cmake @cmakeArgs

    - name: Build
      run: cmake --build build

    - name: Test
      env:
        REGIMEFLOW_TEST_ROOT: ${{ github.workspace }}
      if: matrix.build_type == 'Release'
      run: cd build && ctest --output-on-failure

  vcpkg-consumer:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: ubuntu-24.04
          triplet: x64-linux
        - os: macos-14
          triplet: arm64-osx
        - os: windows-2022
          triplet: x64-windows-static-md

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        submodules: recursive

    - name: Install Linux prerequisites
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build git

    - name: Install macOS prerequisites
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja

    - name: Install Windows prerequisites
      if: runner.os == 'Windows'
      run: choco install cmake ninja --yes --no-progress

    - name: Setup MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@5c330b455f564f5da8d76ddd421de0e33f763f03

    - name: Bootstrap vcpkg (Unix)
      if: runner.os != 'Windows'
      run: |
        git clone https://github.com/microsoft/vcpkg.git vcpkg
        ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg.git vcpkg
        .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

    - name: Configure consumer (Unix)
      if: runner.os != 'Windows'
      env:
        REGIMEFLOW_VCPKG_SOURCE_PATH: ${{ github.workspace }}
      run: |
        cmake -S packaging/vcpkg-consumer -B build-vcpkg-consumer -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}/ports" \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

    - name: Configure consumer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        REGIMEFLOW_VCPKG_SOURCE_PATH: ${{ github.workspace }}
      run: |
        $ninja = (Get-Command ninja).Source
        $crt = "MultiThreadedDLL"
        if ("${{ matrix.triplet }}" -like "*-static" -and "${{ matrix.triplet }}" -notlike "*-static-md") {
          $crt = "MultiThreaded"
        } elseif ("${{ matrix.triplet }}" -like "*-static-md") {
          $crt = "MultiThreadedDLL"
        }
        cmake -S packaging/vcpkg-consumer -B build-vcpkg-consumer -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_MAKE_PROGRAM="$ninja" `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
          -DVCPKG_OVERLAY_PORTS="${{ github.workspace }}\ports" `
          -DCMAKE_MSVC_RUNTIME_LIBRARY="$crt" `
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

    - name: Build consumer
      run: cmake --build build-vcpkg-consumer --config Release

    - name: Run consumer (Unix)
      if: runner.os != 'Windows'
      run: ./build-vcpkg-consumer/regimeflow_vcpkg_consumer

    - name: Run consumer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: .\build-vcpkg-consumer\regimeflow_vcpkg_consumer.exe

  analysis-linux:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build clang-18 clang-tidy-18 ccache \
          libeigen3-dev libboost-all-dev \
          libprotobuf-dev protobuf-compiler \
          libssl-dev libcurl4-openssl-dev \
          libintelrdfpmath-dev

    - name: Configure clang-tidy build
      run: |
        export CC=clang-18 CXX=clang++-18
        cmake -B build-analysis -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DBUILD_TESTS=OFF \
          -DBUILD_PYTHON_BINDINGS=OFF \
          -DREGIMEFLOW_FETCH_DEPS=ON \
          -DENABLE_CLANG_TIDY=ON

    - name: Run clang-tidy build
      run: cmake --build build-analysis

  sanitizers-linux:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build clang-18 ccache \
          libeigen3-dev libboost-all-dev \
          libprotobuf-dev protobuf-compiler \
          libssl-dev libcurl4-openssl-dev \
          libintelrdfpmath-dev

    - name: Configure sanitizer build
      run: |
        export CC=clang-18 CXX=clang++-18
        cmake -B build-asan -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DBUILD_TESTS=ON \
          -DBUILD_PYTHON_BINDINGS=OFF \
          -DREGIMEFLOW_FETCH_DEPS=ON \
          -DENABLE_WERROR=ON \
          -DENABLE_SANITIZERS=ON

    - name: Build
      run: cmake --build build-asan

    - name: Test
      env:
        ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: cd build-asan && ctest --output-on-failure

  python-tests:
    needs: build-linux
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"
        cache-dependency-path: python/pyproject.toml

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build g++ \
          libeigen3-dev libboost-all-dev libprotobuf-dev protobuf-compiler \
          libintelrdfpmath-dev
        python -m venv .venv
        . .venv/bin/activate
        pip install --upgrade pip
        pip install build pytest numpy pandas pybind11

    - name: Build Python package
      run: |
        . .venv/bin/activate
        PYTHON_BIN="$(pwd)/.venv/bin/python"
        NUMPY_INC="$($PYTHON_BIN -c 'import numpy; print(numpy.get_include())')"
        PYBIND11_DIR="$($PYTHON_BIN -c 'import pybind11; print(pybind11.get_cmake_dir())')"
        pip install -e "./python[dev]" \
          --config-settings=cmake.define.Python3_EXECUTABLE="$PYTHON_BIN" \
          --config-settings=cmake.define.Python3_NumPy_INCLUDE_DIRS="$NUMPY_INC" \
          --config-settings=cmake.define.pybind11_DIR="$PYBIND11_DIR"

    - name: Run Python tests
      env:
        REGIMEFLOW_TEST_ROOT: ${{ github.workspace }}
      run: |
        . .venv/bin/activate
        pytest python/tests -v

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-windows, analysis-linux, sanitizers-linux, python-tests]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: python/pyproject.toml

    - name: Download artifacts
      uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e

    - name: Build Python wheels
      run: |
        python -m pip install --upgrade pip
        python -m pip install cibuildwheel
        cibuildwheel --platform linux python
      env:
        CIBW_ENVIRONMENT_LINUX: CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF" SKBUILD_CMAKE_ARGS="-DREGIMEFLOW_FETCH_DEPS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DENABLE_IBAPI=OFF"
        CIBW_BEFORE_ALL_LINUX: >
          python -m pip install cmake &&
          if command -v yum >/dev/null 2>&1; then
            yum install -y protobuf-devel;
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y protobuf-devel;
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y libprotobuf-dev protobuf-compiler;
          else
            echo "No supported package manager found for protobuf; continuing.";
          fi

    - name: Create release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
      with:
        files: |
          wheelhouse/*.whl
          regimeflow-linux-*/*.so
